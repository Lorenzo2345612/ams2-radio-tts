<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Radio TTS</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 24px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 24px;
        }

        .voice-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .voice-btn {
            flex: 1;
            padding: 12px 16px;
            background: #0f0f0f;
            border: 2px solid #333;
            border-radius: 8px;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .voice-btn:hover {
            border-color: #555;
            color: #ccc;
        }

        .voice-btn.active {
            border-color: #4a9eff;
            color: #fff;
            background: #1a2a3a;
        }

        .voice-btn .flag {
            font-size: 18px;
        }

        .options-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            padding: 12px;
            background: #0f0f0f;
            border-radius: 8px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .toggle-label {
            font-size: 13px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #888;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle input:checked + .toggle-slider {
            background-color: #e74c3c;
        }

        .toggle input:checked + .toggle-slider:before {
            transform: translateX(20px);
            background-color: #fff;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            color: #e0e0e0;
            font-size: 14px;
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #4a9eff;
        }

        textarea::placeholder {
            color: #666;
        }

        .char-count {
            text-align: right;
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        button.generate {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #e74c3c;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        button.generate:hover:not(:disabled) {
            background: #c0392b;
        }

        button.generate:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #2a2a2a;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-label .voice-tag {
            background: #2a2a2a;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        .result-label .radio-tag {
            background: #4a1a1a;
            color: #e74c3c;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        audio {
            width: 100%;
            height: 48px;
            border-radius: 8px;
        }

        .error {
            background: #2a1515;
            border: 1px solid #4a2525;
            border-radius: 8px;
            padding: 12px;
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            font-size: 13px;
            margin-top: 16px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-top-color: #e74c3c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .history {
            margin-top: 24px;
        }

        .history-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #0f0f0f;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .history-item audio {
            flex: 1;
        }

        .history-text {
            font-size: 12px;
            color: #888;
            max-width: 100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-voice {
            font-size: 16px;
        }

        .history-radio {
            font-size: 12px;
        }

        .download-btn {
            padding: 8px 12px;
            background: #2a2a2a;
            border: none;
            border-radius: 6px;
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
        }

        .download-btn:hover {
            background: #3a3a3a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Race Radio TTS</h1>

        <div class="card">
            <div class="voice-selector">
                <button class="voice-btn active" data-voice="es_MX">
                    <span class="flag">🇲🇽</span>
                    <span>Español (MX)</span>
                </button>
                <button class="voice-btn" data-voice="en_US">
                    <span class="flag">🇺🇸</span>
                    <span>English (US)</span>
                </button>
            </div>

            <div class="options-row">
                <div class="toggle-container">
                    <label class="toggle">
                        <input type="checkbox" id="radio-effect" checked>
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label">
                        Radio Effect
                    </span>
                </div>
            </div>

            <textarea
                id="text-input"
                placeholder="Escribe el texto a convertir en voz..."
                maxlength="10000"
            ></textarea>
            <div class="char-count"><span id="char-count">0</span> / 10000</div>

            <button class="generate" id="generate-btn">Transmitir</button>

            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <span>Transmitiendo...</span>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <div class="result-label">
                    <span id="result-voice"></span>
                    <span class="radio-tag" id="result-radio" style="display: none;">RADIO</span>
                </div>
                <audio id="audio-player" controls></audio>
            </div>
        </div>

        <div class="history" id="history" style="display: none;">
            <div class="history-title">Recientes</div>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const charCount = document.getElementById('char-count');
        const generateBtn = document.getElementById('generate-btn');
        const radioEffectToggle = document.getElementById('radio-effect');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const result = document.getElementById('result');
        const resultVoice = document.getElementById('result-voice');
        const resultRadio = document.getElementById('result-radio');
        const audioPlayer = document.getElementById('audio-player');
        const history = document.getElementById('history');
        const historyList = document.getElementById('history-list');
        const voiceBtns = document.querySelectorAll('.voice-btn');

        let selectedVoice = 'es_MX';
        let audioHistory = [];

        const voiceFlags = {
            'es_MX': '🇲🇽',
            'en_US': '🇺🇸'
        };

        const voiceNames = {
            'es_MX': 'Español (MX)',
            'en_US': 'English (US)'
        };

        // Voice selector
        voiceBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                voiceBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedVoice = btn.dataset.voice;

                // Update placeholder
                textInput.placeholder = selectedVoice === 'es_MX'
                    ? 'Escribe el texto a convertir en voz...'
                    : 'Enter text to convert to speech...';

                generateBtn.textContent = selectedVoice === 'es_MX'
                    ? 'Transmitir'
                    : 'Transmit';
            });
        });

        textInput.addEventListener('input', () => {
            charCount.textContent = textInput.value.length;
        });

        generateBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            const radioEffect = radioEffectToggle.checked;

            if (!text) {
                showError(selectedVoice === 'es_MX' ? 'Por favor ingresa texto' : 'Please enter some text');
                return;
            }

            generateBtn.disabled = true;
            loading.style.display = 'flex';
            loading.querySelector('span').textContent = selectedVoice === 'es_MX'
                ? 'Transmitiendo...'
                : 'Transmitting...';
            error.classList.remove('show');
            result.classList.remove('show');

            try {
                const response = await fetch('/tts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text,
                        voice: selectedVoice,
                        radio_effect: radioEffect
                    }),
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.detail || 'Generation failed');
                }

                const data = await response.json();

                audioPlayer.src = data.url;
                resultVoice.textContent = voiceNames[data.voice];

                if (data.radio_effect) {
                    resultRadio.style.display = 'inline';
                } else {
                    resultRadio.style.display = 'none';
                }

                result.classList.add('show');
                audioPlayer.play();

                addToHistory(text, data.url, data.voice, data.radio_effect);

            } catch (err) {
                showError(err.message);
            } finally {
                generateBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function showError(message) {
            error.textContent = message;
            error.classList.add('show');
        }

        function addToHistory(text, url, voice, radioEffect) {
            audioHistory.unshift({ text, url, voice, radioEffect });
            if (audioHistory.length > 5) {
                audioHistory.pop();
            }
            renderHistory();
        }

        function renderHistory() {
            if (audioHistory.length === 0) {
                history.style.display = 'none';
                return;
            }

            history.style.display = 'block';
            historyList.innerHTML = audioHistory.map((item) => `
                <div class="history-item">
                    <span class="history-voice">${voiceFlags[item.voice] || ''}</span>
                    <span class="history-radio">${item.radioEffect ? '📻' : '🎙️'}</span>
                    <span class="history-text" title="${escapeHtml(item.text)}">${escapeHtml(item.text)}</span>
                    <audio src="${item.url}" controls></audio>
                    <a href="${item.url}" download class="download-btn">
                        Download
                    </a>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Ctrl+Enter to generate
        textInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                generateBtn.click();
            }
        });
    </script>
</body>
</html>
